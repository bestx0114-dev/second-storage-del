<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>第二庫存區 - 掃碼確認出庫系統</title>
  
  <!-- Tailwind CSS 適用於快速排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome 圖標 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- HTML5-QRCode 核心掃描庫 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    /* 消除手機點擊高亮 */
    -webkit-tap-highlight-color: transparent;
    
    /* 掃描框動畫效果 */
    @keyframes scan-line {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }
    .scan-laser {
      background: linear-gradient(to bottom, rgba(239, 68, 68, 0), rgba(239, 68, 68, 0.8), rgba(239, 68, 68, 0));
      animation: scan-line 3s infinite linear;
    }
    
    /* 限制相機畫面為比例完美 */
    #reader video {
      object-fit: cover !important;
      border-radius: 1rem;
    }

    /* 自訂捲軸樣式 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(30, 41, 59, 0.5);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

  <!-- 頂部導覽列 -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 py-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 text-white p-2 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <i class="fa-solid fa-boxes-packing text-lg"></i>
        </div>
        <div>
          <h1 class="text-md font-bold tracking-wide">第二庫存確認</h1>
          <p class="text-xs text-slate-400">雙重確認 • 掃碼出庫</p>
        </div>
      </div>
      <!-- 狀態指示燈 -->
      <div id="connection-status" class="flex items-center space-x-1 bg-emerald-950 text-emerald-400 px-2.5 py-1 rounded-full text-xs">
        <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse"></span>
        <span id="status-text">系統就緒</span>
      </div>
    </div>
  </header>

  <!-- 主要內容區 -->
  <main class="flex-1 max-w-md w-full mx-auto p-4 pb-32 space-y-4">
    
    <!-- API 設定區（預設折疊） -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-sm transition-all duration-300">
      <div class="flex items-center justify-between cursor-pointer" onclick="toggleApiSettings()">
        <span class="text-sm font-semibold text-slate-300"><i class="fa-solid fa-link mr-2 text-indigo-400"></i>連線設定 (GAS 網址)</span>
        <i id="api-chevron" class="fa-solid fa-chevron-down text-slate-400 transition-transform"></i>
      </div>
      <div id="api-config-body" class="mt-3 space-y-2 hidden">
        <label class="block text-xs text-slate-400">請貼上您的 Google Apps Script 網頁應用程式 URL：</label>
        <input type="text" id="gas-url" 
               class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-indigo-500 text-slate-200"
               placeholder="https://script.google.com/macros/s/.../exec"
               onchange="saveGasUrl()">
        <p class="text-[10px] text-amber-400"><i class="fa-solid fa-triangle-exclamation mr-1"></i>此網址將安全地儲存於此手機瀏覽器的 LocalStorage 中。</p>
      </div>
    </div>

    <!-- 掃描主區塊 -->
    <div class="relative bg-slate-800 border border-slate-700 rounded-3xl p-3 overflow-hidden shadow-xl">
      <!-- 掃描相機視窗 -->
      <div class="relative w-full aspect-square bg-black rounded-2xl overflow-hidden border-2 border-slate-700">
        <div id="reader" class="w-full h-full"></div>
        
        <!-- 掃描框輔助線 overlays -->
        <div id="scan-overlay" class="absolute inset-0 border-[40px] border-black/40 flex items-center justify-center pointer-events-none">
          <div class="relative w-full h-full border-2 border-dashed border-indigo-500/80 rounded-lg">
            <!-- 四角定位線 -->
            <div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-indigo-500 rounded-tl"></div>
            <div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-indigo-500 rounded-tr"></div>
            <div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-indigo-500 rounded-bl"></div>
            <div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-indigo-500 rounded-br"></div>
            <!-- 雷射掃描線 -->
            <div class="absolute left-0 w-full h-10 scan-laser"></div>
          </div>
        </div>
        
        <!-- 相機關閉時的提示 -->
        <div id="camera-placeholder" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center text-center p-6 z-10">
          <i class="fa-solid fa-camera text-slate-600 text-5xl mb-3"></i>
          <p class="text-sm text-slate-400 mb-4">相機尚未啟動</p>
          <button onclick="startScanning()" class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold py-2 px-6 rounded-full transition text-sm shadow-lg shadow-indigo-500/20">
            開啟相機鏡頭
          </button>
        </div>
      </div>

      <!-- 控制面板 -->
      <div class="mt-4 flex items-center justify-between px-1">
        <div class="flex space-x-2">
          <!-- 手電筒開關 -->
          <button id="torch-btn" onclick="toggleTorch()" disabled
                  class="bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-600 active:scale-95 text-white p-3 rounded-full transition shadow-md flex items-center justify-center h-11 w-11">
            <i class="fa-solid fa-lightbulb"></i>
          </button>
          <!-- 切換鏡頭 -->
          <button onclick="switchCamera()" 
                  class="bg-slate-700 hover:bg-slate-600 active:scale-95 text-white p-3 rounded-full transition shadow-md flex items-center justify-center h-11 w-11">
            <i class="fa-solid fa-camera-rotate"></i>
          </button>
        </div>

        <!-- 暫停 / 繼續 掃描按鈕 -->
        <button id="scan-toggle-btn" onclick="stopScanning()" style="display:none;"
                class="bg-rose-950 hover:bg-rose-900 border border-rose-800 text-rose-200 font-medium py-2 px-4 rounded-full transition text-xs">
          暫停相機
        </button>
      </div>
    </div>

    <!-- 待出庫清單區 -->
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 shadow-sm space-y-3">
      <div class="flex items-center justify-between border-b border-slate-700 pb-2">
        <div class="flex items-center space-x-2">
          <span class="text-sm font-bold text-slate-200">待確認出庫清單</span>
          <span id="list-counter" class="bg-indigo-900/50 text-indigo-400 text-xs px-2 py-0.5 rounded-full font-bold">0 筆</span>
        </div>
        <button onclick="clearPendingList()" class="text-xs text-slate-500 hover:text-slate-400">
          <i class="fa-solid fa-trash-can mr-1"></i>清空清單
        </button>
      </div>

      <!-- 待確認項目列表 -->
      <div id="pending-list-container" class="space-y-2 max-h-72 overflow-y-auto pr-1 custom-scrollbar">
        <div id="empty-list-placeholder" class="text-center py-8 text-slate-500 text-xs">
          <i class="fa-solid fa-clipboard-list text-3xl mb-2 block text-slate-600"></i>
          請掃描商品貨號 QR Code，項目將會呈現在此。
        </div>
      </div>
    </div>

  </main>

  <!-- 底部固定確認欄 -->
  <div class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 p-4 z-40">
    <div class="max-w-md mx-auto">
      <button id="checkout-btn" onclick="submitCheckout()" disabled
              class="w-full bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-500 disabled:border-slate-700 disabled:shadow-none hover:bg-emerald-500 active:scale-95 text-white font-bold py-3 px-4 rounded-2xl transition shadow-lg shadow-emerald-500/10 flex items-center justify-center space-x-2">
        <i class="fa-solid fa-circle-check text-lg"></i>
        <span>請先掃描商品</span>
      </button>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let isScanning = false;
    let currentFacingMode = "environment"; 
    let isTorchOn = false;
    
    // 預設的 GAS 部署網址（已填入您提供的最新網址）
    const defaultGasUrl = "https://script.google.com/macros/s/AKfycbyzEG3tnuSb1SoGc2TDZ6T5ZGwH_AaE7Wr0OzrAc73PmT_I5RvxYMhi48fL8WM_peHt/exec";
    
    // 儲存目前待出庫的資料：Array of { id, itemCode, itemName, status: 'loading'|'success'|'error' }
    let pendingItems = []; 

    // Web Audio API 合成音效（100% 獨立不相依外部檔案網址）
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'success') {
          // 高亢悅耳嗶聲
          osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
          osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'error') {
          // 低沉警告音
          osc.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
          gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
          osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'checkout') {
          // 成功出庫的三連音
          const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
          notes.forEach((freq, index) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.1));
            g.gain.setValueAtTime(0.08, audioCtx.currentTime + (index * 0.1));
            o.start(audioCtx.currentTime + (index * 0.1));
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (index * 0.1) + 0.15);
            o.stop(audioCtx.currentTime + (index * 0.1) + 0.15);
          });
        }
      } catch (e) {
        console.warn("無法播放合成音效", e);
      }
    }

    // 初始化載入 LocalStorage，若無資料則直接寫入預設 URL
    window.onload = function() {
      let savedUrl = localStorage.getItem('second_inventory_gas_url');
      if (!savedUrl || savedUrl.trim() === "") {
        localStorage.setItem('second_inventory_gas_url', defaultGasUrl);
        savedUrl = defaultGasUrl;
      }
      document.getElementById('gas-url').value = savedUrl;
      updateCheckoutButton();
    };

    function toggleApiSettings(forceShow = false) {
      const body = document.getElementById('api-config-body');
      const chevron = document.getElementById('api-chevron');
      if (body.classList.contains('hidden') || forceShow) {
        body.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        body.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    function saveGasUrl() {
      const url = document.getElementById('gas-url').value.trim();
      localStorage.setItem('second_inventory_gas_url', url);
      showToast("API 網址儲存成功！", "success");
    }

    // 更新連線狀態燈
    function updateSystemStatus(text, type) {
      const indicator = document.getElementById('connection-status');
      const textSpan = document.getElementById('status-text');
      textSpan.innerText = text;
      
      if (type === 'error') {
        indicator.className = "flex items-center space-x-1 bg-rose-950 text-rose-400 px-2.5 py-1 rounded-full text-xs";
        indicator.firstElementChild.className = "h-2 w-2 rounded-full bg-rose-400";
      } else if (type === 'processing') {
        indicator.className = "flex items-center space-x-1 bg-indigo-950 text-indigo-400 px-2.5 py-1 rounded-full text-xs";
        indicator.firstElementChild.className = "h-2 w-2 rounded-full bg-indigo-400 animate-spin";
      } else {
        indicator.className = "flex items-center space-x-1 bg-emerald-950 text-emerald-400 px-2.5 py-1 rounded-full text-xs";
        indicator.firstElementChild.className = "h-2 w-2 rounded-full bg-emerald-400 animate-pulse";
      }
    }

    // 啟動相機
    function startScanning() {
      const gasUrl = localStorage.getItem('second_inventory_gas_url');
      if (!gasUrl) {
        alert("請先在上方『連線設定』中填入 Google Apps Script 部署網址！");
        toggleApiSettings(true);
        return;
      }

      document.getElementById('camera-placeholder').style.display = 'none';
      document.getElementById('scan-toggle-btn').style.display = 'block';

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      const config = {
        fps: 15,
        qrbox: function(width, height) {
          return { width: width * 0.75, height: height * 0.75 };
        },
        aspectRatio: 1.0
      };

      html5QrCode.start(
        { facingMode: currentFacingMode },
        config,
        onScanSuccess,
        onScanFailure
      )
      .then(() => {
        isScanning = true;
        const torchButton = document.getElementById('torch-btn');
        if (html5QrCode.getRunningTrackCapabilities().torch) {
          torchButton.disabled = false;
        } else {
          torchButton.disabled = true;
        }
        updateSystemStatus("正在掃描商品", "success");
      })
      .catch((err) => {
        console.error("相機啟動失敗: ", err);
        document.getElementById('camera-placeholder').style.display = 'flex';
        document.getElementById('scan-toggle-btn').style.none = 'none';
        alert("無法啟動相機，請確認是否已授予相機權限，且必須在 HTTPS 安全協定下執行。");
      });
    }

    // 停止相機
    function stopScanning() {
      if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
          isScanning = false;
          isTorchOn = false;
          document.getElementById('camera-placeholder').style.display = 'flex';
          document.getElementById('scan-toggle-btn').style.display = 'none';
          document.getElementById('torch-btn').disabled = true;
          updateSystemStatus("系統就緒", "success");
        }).catch((err) => {
          console.error("無法停止相機: ", err);
        });
      }
    }

    // 切換前後鏡頭
    function switchCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      if (isScanning) {
        html5QrCode.stop().then(() => {
          startScanning();
        });
      }
    }

    // 切換手電筒
    function toggleTorch() {
      if (html5QrCode && isScanning) {
        isTorchOn = !isTorchOn;
        html5QrCode.applyVideoConstraints({
          advanced: [{ torch: isTorchOn }]
        }).then(() => {
          const btn = document.getElementById('torch-btn');
          if (isTorchOn) {
            btn.classList.add('bg-amber-500', 'text-slate-900');
            btn.classList.remove('bg-slate-700', 'text-white');
          } else {
            btn.classList.remove('bg-amber-500', 'text-slate-900');
            btn.classList.add('bg-slate-700', 'text-white');
          }
        }).catch(err => {
          console.error("無法切換手電筒: ", err);
        });
      }
    }

    // 掃描成功回呼
    function onScanSuccess(decodedText, decodedResult) {
      const itemCode = decodedText.trim();
      if (!itemCode) return;

      const now = Date.now();
      
      // 防止在 1.5 秒內快速重複掃入同一個一模一樣的 QR Code
      const duplicateInList = pendingItems.find(item => item.itemCode === itemCode && (now - item.timestamp < 1500));
      if (duplicateInList) return;

      playSound('success');
      addItemToPending(itemCode);
    }

    function onScanFailure(error) {
      // 靜默處理
    }

    // 將新掃描的貨號新增到待確認清單
    function addItemToPending(itemCode) {
      const id = "item-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5);
      const newItem = {
        id: id,
        itemCode: itemCode,
        itemName: "正在查詢品名...",
        status: "loading",
        timestamp: Date.now()
      };

      pendingItems.push(newItem);
      renderPendingList();
      
      // 向後端 API 查詢該商品品名
      queryItemName(id, itemCode);
    }

    // 呼叫 API 查詢單筆品名
    function queryItemName(id, itemCode) {
      const gasUrl = localStorage.getItem('second_inventory_gas_url');
      if (!gasUrl) return;

      updateSystemStatus("查詢品名中...", "processing");

      fetch(gasUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: JSON.stringify({
          action: "query",
          itemCode: itemCode
        })
      })
      .then(response => response.json())
      .then(data => {
        const target = pendingItems.find(item => item.id === id);
        if (target) {
          if (data.status === "success") {
            target.itemName = data.itemName;
            target.status = "success";
          } else {
            target.itemName = "查詢失敗";
            target.status = "error";
          }
          renderPendingList();
        }
        updateSystemStatus("正在掃描商品", "success");
      })
      .catch(error => {
        console.error("查詢失敗:", error);
        const target = pendingItems.find(item => item.id === id);
        if (target) {
          target.itemName = "無法連線";
          target.status = "error";
          renderPendingList();
        }
        updateSystemStatus("連線異常", "error");
      });
    }

    // 從清單中手動移除項目
    function removeItem(id) {
      pendingItems = pendingItems.filter(item => item.id !== id);
      renderPendingList();
      playSound('error');
    }

    // 清空清單
    function clearPendingList() {
      if (pendingItems.length === 0) return;
      if (confirm("確定要清空目前所有待確認項目嗎？")) {
        pendingItems = [];
        renderPendingList();
      }
    }

    // 渲染待確認清單
    function renderPendingList() {
      const container = document.getElementById('pending-list-container');
      const counter = document.getElementById('list-counter');
      
      // 更新計數器
      counter.innerText = `${pendingItems.length} 筆`;

      if (pendingItems.length === 0) {
        container.innerHTML = `
          <div id="empty-list-placeholder" class="text-center py-8 text-slate-500 text-xs">
            <i class="fa-solid fa-clipboard-list text-3xl mb-2 block text-slate-600"></i>
            請掃描商品貨號 QR Code，項目將會呈現在此。
          </div>
        `;
        updateCheckoutButton();
        return;
      }

      // 產生清單 HTML
      let html = "";
      // 反轉陣列，讓最新掃描到的出現在最上面
      const displayItems = [...pendingItems].reverse();

      displayItems.forEach(item => {
        let statusBadge = "";
        let itemNameClass = "text-slate-200";

        if (item.status === "loading") {
          statusBadge = `<span class="text-[10px] bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded flex items-center"><i class="fa-solid fa-spinner animate-spin mr-1"></i> 查詢中</span>`;
          itemNameClass = "text-slate-400 italic";
        } else if (item.status === "error") {
          statusBadge = `<span class="text-[10px] bg-rose-950 text-rose-400 px-1.5 py-0.5 rounded flex items-center"><i class="fa-solid fa-triangle-exclamation mr-1"></i> 錯誤</span>`;
          itemNameClass = "text-rose-400";
        } else if (item.itemName === "未登記過的商品") {
          statusBadge = `<span class="text-[10px] bg-amber-950 text-amber-400 px-1.5 py-0.5 rounded flex items-center"><i class="fa-solid fa-circle-question mr-1"></i> 未登記</span>`;
          itemNameClass = "text-amber-400";
        } else {
          statusBadge = `<span class="text-[10px] bg-indigo-950 text-indigo-400 px-1.5 py-0.5 rounded flex items-center"><i class="fa-solid fa-check mr-1"></i> 已尋獲</span>`;
        }

        html += `
          <div class="bg-slate-900 border border-slate-700/50 rounded-xl p-3 flex items-center justify-between transition-all duration-200">
            <div class="space-y-1 pr-2 flex-1">
              <div class="flex items-center space-x-2">
                <span class="text-xs font-mono font-bold bg-slate-800 text-slate-300 px-2 py-0.5 rounded">${item.itemCode}</span>
                ${statusBadge}
              </div>
              <p class="text-sm font-semibold tracking-wide ${itemNameClass}">${item.itemName}</p>
            </div>
            <button onclick="removeItem('${item.id}')" class="text-slate-500 hover:text-red-400 p-2 rounded-lg transition active:scale-90">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        `;
      });

      container.innerHTML = html;
      updateCheckoutButton();
    }

    // 更新底部確認出庫按鈕狀態
    function updateCheckoutButton() {
      const btn = document.getElementById('checkout-btn');
      
      const isAnyLoading = pendingItems.some(item => item.status === 'loading');
      const hasItems = pendingItems.length > 0;

      if (hasItems && !isAnyLoading) {
        btn.disabled = false;
        btn.className = "w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold py-3 px-4 rounded-2xl transition shadow-lg shadow-emerald-500/20 flex items-center justify-center space-x-2 cursor-pointer";
        btn.innerHTML = `<i class="fa-solid fa-circle-check text-lg"></i> <span>確認送出出庫 (${pendingItems.length} 筆)</span>`;
      } else {
        btn.disabled = true;
        btn.className = "w-full bg-slate-800 border border-slate-700 text-slate-500 font-bold py-3 px-4 rounded-2xl transition flex items-center justify-center space-x-2 cursor-not-allowed";
        
        if (!hasItems) {
          btn.innerHTML = `<span>請先掃描商品</span>`;
        } else if (isAnyLoading) {
          btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-1"></i> <span>正在取得所有品名...</span>`;
        }
      }
    }

    // 提交批次確認出庫（刪除試算表列）
    function submitCheckout() {
      const gasUrl = localStorage.getItem('second_inventory_gas_url');
      if (!gasUrl || pendingItems.length === 0) return;

      const itemCodesToCheckout = pendingItems.map(item => item.itemCode);
      
      if (!confirm(`確定要將這 ${pendingItems.length} 筆商品自第二庫存區出庫嗎？\n確認後將會自試算表中整列刪除。`)) {
        return;
      }

      updateSystemStatus("正在執行出庫刪除...", "processing");
      
      const btn = document.getElementById('checkout-btn');
      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>正在扣庫存，請勿關閉視窗...</span>`;

      fetch(gasUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: JSON.stringify({
          action: "checkout",
          itemCodes: itemCodesToCheckout
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          playSound('checkout');
          showToast(`出庫成功！${data.details}`, "success");
          
          pendingItems = [];
          renderPendingList();
          updateSystemStatus("出庫完成", "success");
        } else {
          playSound('error');
          alert("出庫失敗: " + data.message);
          updateSystemStatus("出庫異常", "error");
          updateCheckoutButton();
        }
      })
      .catch(error => {
        console.error("出庫送出失敗:", error);
        playSound('error');
        alert("出庫送出失敗，請檢查網路連線後再試一次！");
        updateSystemStatus("連線異常", "error");
        updateCheckoutButton();
      });
    }

    // 畫面上自訂浮動通知小視窗 (Toast)
    function showToast(message, type = "success") {
      const toast = document.createElement('div');
      toast.className = `fixed bottom-24 left-1/2 transform -translate-x-1/2 px-4 py-3 rounded-2xl text-xs font-semibold shadow-2xl z-50 transition-all ${
        type === 'success' ? 'bg-emerald-500 text-white border border-emerald-400/20' : 'bg-rose-500 text-white border border-rose-400/20'
      }`;
      toast.innerHTML = `<div class="flex items-center space-x-2"><i class="fa-solid ${type === 'success' ? 'fa-circle-check' : 'fa-triangle-exclamation'} text-sm"></i> <span>${message}</span></div>`;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
      }, 3500);
    }
  </script>
</body>
</html>
